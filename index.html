<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* .container សម្រាប់ក្តោបទាំងអស់ */
    .container {
        margin-left:30px;
        margin-top:70px;
    }
    h3 {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 30px;
    }

    button {
        padding: 20px 30px;
        border: none;
        color: white;

        border-radius: 10px;

        /* border-radius:20px;សម្រាប់កាត់ជ្រុងប្រអប */
    }

    .btn1 {
        background-color: blue;
       
    }

    .btn2 {
        background-color: black;
        
    }

    .btn3 {
        background-color: transparent;
        color: black;
        border: 1px solid black;
        border-radius: 30px;
    }

    .btn4{
        background-color:rgb(255, 0, 0);
        cursor:pointer;
        transition: all 0.9s;
    }
    .btn4:hover{
        background-color:black;
    }


    .btn5{
        background-color:salmon;
        cursor:pointer;
        transition: all 0.9s;
    }
    .btn5:hover{
        background-color:chartreuse;
        /* border: 1px solid black; */
        outline: 3px solid black;
    }

    .btn6{
        background-color:transparent;
        color:blue;
        border: 1px solid blue;
        cursor:pointer;
        transition: all 0.9s;

    }
    .btn6:hover{
        background-color:black;
        color: white;
        outline: none;

    }

    .btn7{
        background-color:black;
        cursor:pointer;
        transition:all 0.3s;
    }
    .btn7:hover{
        /* transform:scale(1.1) សម្រាប់ពង្រីក ឬពង្រួម */
        transform:scale(1.1);
        background-color:rgb(79, 45, 45);

    }

    .btn8{
        background-color:blue;
        cursor:pointer;
        transition:all 0.4s;
        
    }
    .btn8:hover{
        /* transform:rotate(40deg);សម្រាប់បង្វិល */
        transform:rotate(40deg);
        transform:rotate(40deg);
        background-color:rgb(79, 45, 45);
    }

    .btn9{
        background-color:brown;
        cursor:pointer;
        transition:all 0.3s;
    }

    .btn9:hover{
        background-color:rgb(79, 45, 45);
        transform:scale(8);

    }
</style>

<body>
    <h3>Primary</h3>
    <div class="container">
        <button class="btn1">Primary-btn</button>
        <button class="btn2">Primary-btn</button>
        <button class="btn3">Primary-btn</button>
    </div>


     <h3>Primary</h3>
    <div class="container">
        <button class="btn4">Primary-btn</button>
        <button class="btn5">Primary-btn</button>
        <button class="btn6">Primary-btn</button>
    </div>


     <h3>Primary</h3>
    <div class="container">
        <button class="btn7">Primary-btn</button>
        <button class="btn8">Primary-btn</button>
        <button class="btn9">Primary-btn</button>
    </div>

</body>

</html>
